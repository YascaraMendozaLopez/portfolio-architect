name: Gemini PR Reviewer (Astro Optimized)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Gemini Review Bot
        uses: Nasubikun/ai-reviewer@v1.0.6
        with:
          # Tu API Key guardada en Secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # Token automático de GitHub (no necesitas crearlo, ya existe)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # Usamos la versión estable de Flash
          MODEL_CODE: "gemini-1.5-flash"
          
          # Idioma de los comentarios
          LANGUAGE: "Spanish"
          
          # Patrones a excluir (aquí ignoramos lo de Astro y pnpm)
          EXCLUDE_PATHS: "pnpm-lock.yaml,package-lock.json,node_modules/**,.astro/**,dist/**,public/**,*.md,*.png,*.jpg,*.svg"
